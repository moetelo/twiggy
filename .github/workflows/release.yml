name: Publish

on:
  workflow_dispatch: ~
  push:
    tags:
      - "v[0-9]+.[0-9]+.[0-9]+"

env:
  NPM_TOKEN: ${{ secrets.NPM_PAT }}
  VSCE_PAT: ${{ secrets.VS_MARKETPLACE_TOKEN }}
  OVSX_PAT: ${{ secrets.OPEN_VSX_TOKEN }}

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version-file: .github/.bun-version

      - run: bun ci

      - run: bun run build

      - run: bunx @vscode/vsce publish --no-dependencies
        working-directory: ./packages/vscode

      - run: bunx ovsx publish --no-dependencies
        working-directory: ./packages/vscode

      - name: npm publish language-server
        working-directory: ./packages/language-server
        run: |
            npm config set "//registry.npmjs.org/:_authToken" "${NPM_TOKEN}"
            npm publish --access public
